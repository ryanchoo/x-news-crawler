name: X Keyword Push Bot

on:
  schedule:
    # 10분마다 자동으로 실행되도록 설정 (UTC 기준)
    # ⚠️ 단, 깃허브 무료 스케줄러 특성상 정시 정각보다는 몇 분 정도 지연 실행될 수 있습니다.
    - cron: '*/10 * * * *'
  workflow_dispatch: # 필요할 때 깃허브 웹에서 수동으로 실행해볼 수 있는 버튼 생성

jobs:
  cron-run:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
        playwright install chromium

    - name: 크롤러 실행
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: python tracker.py

    - name: 마지막 트윗 기록 저장 (중복 방지용 변경사항 커밋)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_tweet.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update last tweet state" && git push)
